      <div class="popup-meta">
        <span class="popup-meta-item"><span class="meta-label" data-lang-key="popup.age"></span> <span id="popup-age"></span></span>

        <div class="vital-value" id="popup-temp"></div>
      </div>
      <div class="vital-cell">
        <div class="vital-label" data-lang-key="popup.pulse"></div>
        <div class="vital-value" id="popup-pulse"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { OutlinePass } from 'three/addons/postprocessing/OutlinePass.js';
    import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

    // --- Renderer ---
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.appendChild(renderer.domElement);

    // --- Scene ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 25, 60);

    // --- Camera ---
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.6, -10);
    camera.rotation.order = 'YXZ'; // Match PointerLockControls euler order to prevent quaternion↔euler drift
    camera.rotation.y = Math.PI;   // Face towards street (+Z)

    // --- Post-processing (OutlinePass) ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));

    const outlinePass = new OutlinePass(new THREE.Vector2(window.innerWidth, window.innerHeight), scene, camera);
    outlinePass.visibleEdgeColor.set(0x00ff44);
    outlinePass.hiddenEdgeColor.set(0x00ff44);
    outlinePass.edgeStrength = 5;
    outlinePass.edgeThickness = 2;
    outlinePass.edgeGlow = 0.5;
    composer.addPass(outlinePass);

    composer.addPass(new OutputPass());

    Game.Outline = {
      setHover: function(objects, color) {
        outlinePass.selectedObjects = objects;
        if (color !== undefined) {
          outlinePass.visibleEdgeColor.set(color);
          outlinePass.hiddenEdgeColor.set(color);
        } else {
          outlinePass.visibleEdgeColor.set(0x00ff44);
          outlinePass.hiddenEdgeColor.set(0x00ff44);
        }
      },
      clearHover: function() {
        outlinePass.selectedObjects = [];
      }
    };

    // --- Resize ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Collidable objects ---
    const collidables = [];

    // --- Build world ---
    const { beds, waitingChairs, cashierDesk, bedMeshes, chairMeshes, sunLight } = Game.World.setup(THREE, scene, collidables);

    // --- Setup controls ---
    const controls = Game.Controls.setup(THREE, camera, collidables, PointerLockControls);

    // --- Setup patients ---
    Game.Patients.setup(THREE, scene, camera, controls, beds, waitingChairs);

    // --- Setup consumables, inventory, shop, shelves ---
    Game.Furniture.setup(THREE, scene, camera, controls, collidables);
    Game.Furniture.registerExisting(bedMeshes, chairMeshes);
    Game.Consumables.setup(THREE, scene, camera, controls, collidables);
    Game.Inventory.setup();
    Game.Levels.setup(controls);
    Game.Shop.setup(controls);
    Game.Ads.setup();
    Game.WashingMachine.setup(THREE, scene, camera, controls, collidables);
    Game.Shelves.setup(THREE, scene, camera, controls, collidables);
    Game.ToolPanel.setup(THREE, scene, camera, controls, collidables);
    Game.Diagnostics.setup(controls);
    Game.Cashier.setup(THREE, scene, camera, controls, cashierDesk);
    Game.Staff.setup(THREE, scene, camera, controls, collidables);
    Game.Trash.setup(THREE, scene, camera, controls, collidables);
    Game.Shift.setup(THREE, scene, camera, controls, collidables);
    Game.Tutorial.setup(controls, THREE, camera, scene);
    Game.Interaction.setup(THREE, camera, controls);

    // --- Quality settings ---
    let useComposer = true;
    const savedQuality = localStorage.getItem('graphicsQuality') || 'high';

    function applyQuality(level) {
      localStorage.setItem('graphicsQuality', level);
      document.querySelectorAll('.quality-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.quality === level);
      });
      if (level === 'low') {
        renderer.setPixelRatio(1);
        renderer.shadowMap.enabled = false;
        scene.fog.near = 15;
        scene.fog.far = 35;
        useComposer = false;
      } else if (level === 'medium') {
        renderer.setPixelRatio(1);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.BasicShadowMap;
        sunLight.shadow.mapSize.width = 512;
        sunLight.shadow.mapSize.height = 512;
        scene.fog.near = 20;
        scene.fog.far = 50;
        useComposer = true;
      } else {
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        scene.fog.near = 25;
        scene.fog.far = 60;
        useComposer = true;
      }
      renderer.shadowMap.needsUpdate = true;
    }

    applyQuality(savedQuality);

    document.querySelectorAll('.quality-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        applyQuality(btn.dataset.quality);
      });
    });

    // --- FPS counter ---
    const fpsEl = document.getElementById('fps-counter');
    Game.FPS = { frames: 0 };
    setInterval(() => {
      fpsEl.textContent = Game.FPS.frames + ' FPS';
      Game.FPS.frames = 0;
    }, 1000);

    // --- Animation loop (locked to 60 FPS) ---
    const clock = new THREE.Clock();
    let frameCount = 0;
    const FPS_LIMIT = 60;
    const FRAME_MIN_TIME = 1000 / FPS_LIMIT;
    let lastFrameTime = 0;

    function animate(now) {
      requestAnimationFrame(animate);
      if (now - lastFrameTime < FRAME_MIN_TIME) return;
      lastFrameTime = now - ((now - lastFrameTime) % FRAME_MIN_TIME);

      const delta = Math.min(clock.getDelta(), 0.05);
      frameCount++;
      Game.FPS.frames++;

      // Freeze game during ad playback
      if (Game.Ads && Game.Ads.isFrozen()) {
        if (useComposer) composer.render(); else renderer.render(scene, camera);
        return;
      }

      if (controls.isLocked) {
        Game.Controls.update(delta);
      }

      Game.Interaction.update();
      Game.Patients.update(delta);
      Game.Consumables.update(delta);
      Game.Staff.update(delta);
      Game.Cashier.update(delta);

      // Throttled updates (every 2nd frame)
      if (frameCount % 2 === 0) {
        Game.Furniture.update(delta * 2);
        Game.WashingMachine.update(delta * 2);
        Game.Shelves.update(delta * 2);
        Game.ToolPanel.update(delta * 2);
        Game.Trash.update(delta * 2);
        Game.Shift.update(delta * 2);
      }

      if (Game.Tutorial.isActive && Game.Tutorial.isActive()) {
        Game.Tutorial.update(delta);
      }

      if (useComposer) {
        composer.render();
      } else {
        renderer.render(scene, camera);
      }
    }
    animate(0);
  </script>
</body>
</html>
